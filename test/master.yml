host_ip : "<master_ip_address>"
is_master_broker: True

remote_subscriber_ips: []
remote_publisher_ips:
  - "<slave_ip_address>"
connections:
  - ssh_username: "<slave_username>"
    ssh_host_ip: "<slave_ip_address>"
    platform: "Windows"
    config_filepath: "./slave.yml"
    project_dir: "C:\\Users\\<slave_username>\\<hermes_project_path>"
    output_dir: ".\\data\\latency\\multi_device"

  # - ssh_username: "<slave_username>"
  #   ssh_host_ip: "<slave_ip_address>"
  #   platform: "Linux"
  #   config_filepath: "./slave.yml"
  #   project_dir: "~/<hermes_project_path>"
  #   output_dir: "./data/latency/multi_device"

is_remote_kill: False
remote_kill_ip: null


logging_spec:
  stream_period_s     : 5

  stream_hdf5         : True
  stream_csv          : False
  stream_video        : False
  stream_audio        : False

  dump_csv            : False
  dump_hdf5           : False
  dump_video          : False
  dump_audio          : False

video_codec_config_filepath : null
audio_codec_config_filepath : null


producer_specs:


consumer_specs:
  - package: "dummy"
    class: "DummyConsumer"
    settings:
      stream_in_specs:
        - package: "dummy"
          class: "DummyProducer"
          settings:
            sampling_rate_hz: ${HERMES_EXP_RATE}
            payload_num_bytes: ${HERMES_EXP_NUM_BYTES}


pipeline_specs: []
